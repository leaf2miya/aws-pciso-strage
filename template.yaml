AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: S3 upload event handler - extracts path components and stores to DynamoDB

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [prd, dev]

Resources:
  S3UploadHandlerFunction:
    Type: AWS::Serverless::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: s3uploadExtractPathNameToDynamoDB
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      CodeUri: src/handler/
      Role: !Sub '{{resolve:ssm-secure:/aws-pciso-strage/${Env}/lambda-role-arn}}'
      Timeout: 5
      AutoPublishAlias: live
      Environment:
        Variables:
          DYNAMODB_TABLE: !Sub '{{resolve:ssm-secure:/aws-pciso-strage/${Env}/dynamodb-table-name}}'

  S3InvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt S3UploadHandlerFunction.Arn
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub 'arn:aws:s3:::{{resolve:ssm-secure:/aws-pciso-strage/${Env}/s3-bucket-name}}'
